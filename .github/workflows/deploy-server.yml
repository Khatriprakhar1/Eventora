name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: MONGO_URI,JWT_SECRET,CLIENT_URL,EMAIL_USER,EMAIL_PASS,SUPER_ADMIN_EMAIL,NODE_ENV,PORT
          script: |
            # Clone repo if first time, otherwise pull latest
            if [ ! -d "/home/ubuntu/Eventora" ]; then
              git clone https://github.com/Khatriprakhar1/Eventora.git /home/ubuntu/Eventora
            else
              cd /home/ubuntu/Eventora
              git pull origin main
            fi

            # Go to server directory
            cd /home/ubuntu/Eventora/server

            # Write .env from GitHub Secrets (overwrites each deploy to stay in sync)
            cat > .env << 'ENVEOF'
            MONGO_URI=$MONGO_URI
            JWT_SECRET=$JWT_SECRET
            CLIENT_URL=$CLIENT_URL
            EMAIL_USER=$EMAIL_USER
            EMAIL_PASS=$EMAIL_PASS
            SUPER_ADMIN_EMAIL=$SUPER_ADMIN_EMAIL
            NODE_ENV=$NODE_ENV
            PORT=$PORT
            ENVEOF

            # Install production dependencies
            npm install --production

            # Restart with PM2 (or start if first time)
            pm2 restart eventora-server || pm2 start server.js --name "eventora-server"

            # Save PM2 list so it survives reboots
            pm2 save
