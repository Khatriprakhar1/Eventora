name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: MONGO_URI,JWT_SECRET,CLIENT_URL,EMAIL_USER,EMAIL_PASS,SUPER_ADMIN_EMAIL,NODE_ENV,PORT
          script: |
            # Clone repo if first time, otherwise pull latest
            if [ ! -d "/home/ubuntu/Eventora" ]; then
              git clone https://github.com/Khatriprakhar1/Eventora.git /home/ubuntu/Eventora
            else
              cd /home/ubuntu/Eventora
              git pull origin main
            fi

            cd /home/ubuntu/Eventora/server

            # Safe upsert: only write a key if the secret value is non-empty.
            # Existing .env keys not listed here are left untouched.
            upsert_env() {
              local key=$1 val=$2
              [ -z "$val" ] && return          # skip if secret not set
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            touch .env
            upsert_env MONGO_URI         "$MONGO_URI"
            upsert_env JWT_SECRET        "$JWT_SECRET"
            upsert_env CLIENT_URL        "$CLIENT_URL"
            upsert_env EMAIL_USER        "$EMAIL_USER"
            upsert_env EMAIL_PASS        "$EMAIL_PASS"
            upsert_env SUPER_ADMIN_EMAIL "$SUPER_ADMIN_EMAIL"
            upsert_env NODE_ENV          "$NODE_ENV"
            upsert_env PORT              "$PORT"

            # Install production dependencies
            npm install --production

            # Restart with PM2 (or start if first time)
            pm2 restart eventora-server || pm2 start server.js --name "eventora-server"

            # Save PM2 list so it survives reboots
            pm2 save
