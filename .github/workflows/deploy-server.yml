name: Deploy Backend (Express)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to project directory (update this to your path on the EC2 instance)
            cd /home/${{ secrets.EC2_USER }}/Eventora
            
            # Pull the latest changes
            git pull origin main
            
            # Navigate to server and install production dependencies
            cd server
            npm install --production
            
            # Restart server using PM2
            pm2 restart eventora-server || pm2 start server.js --name "eventora-server"
